# Development can use MySQL by setting DATABASE_URL, for example:
# DATABASE_URL=mysql2://root:password@127.0.0.1/finquery_development
# If DATABASE_URL is not set, the app falls back to the local SQLite database.
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3
  url: <%= ENV["DATABASE_URL"] %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

# Production uses TiDB (MySQL-compatible) via DATABASE_URL.
production:
  adapter: mysql2
  url: <%= ENV["DATABASE_URL"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  ssl_mode: verify_identity
